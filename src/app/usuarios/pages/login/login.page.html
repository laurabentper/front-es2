<ion-content class="ion-padding">
  <h1>CardioTrack</h1>
  <p>Acesse sua conta</p>

  <ion-item>
    <ion-label position="stacked">E-mail</ion-label>
    <ion-input
      type="email"
      [(ngModel)]="email"
      placeholder="Digite seu e-mail"
    ></ion-input>
  </ion-item>

  <ion-item>
    <ion-label position="stacked">Senha</ion-label>
    <ion-input
      type="password"
      [(ngModel)]="senha"
      placeholder="Digite sua senha"
    ></ion-input>
  </ion-item>

  <ion-button expand="block" (click)="entrar()">
    Entrar
  </ion-button>

  <ion-button expand="block" fill="clear" routerLink="/cadastro">
    Criar conta
  </ion-button>

  @if (mensagemErro) {
  <ion-text color="danger">
    <p>{{ mensagemErro }}</p>
  </ion-text>
}
